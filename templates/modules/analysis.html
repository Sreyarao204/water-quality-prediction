<!DOCTYPE html>
<html>
<head>
    <title>Analysis Module</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .card {
            border-radius: 12px;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<div class="container mt-5 text-center">

    <h2 class="mb-4">Analysis Module</h2>

    <div class="row justify-content-center">

        <!-- Charts -->
        <div class="col-md-4">
            <div class="card p-4 shadow">
                <h5>Visual Representation</h5>
                <p>View charts and graphs</p>
                <a href="/charts" class="btn btn-success">Open</a>
            </div>
        </div>

        <!-- Precautions -->
        <div class="col-md-4">
            <div class="card p-4 shadow">
                <h5>Precautions</h5>
                <p>Safety recommendations</p>
                <a href="/precautions" class="btn btn-warning">Open</a>
            </div>
        </div>

    </div>

    <br>

    <!-- Back Button -->
    <a href="/" class="btn btn-secondary mt-3">← Back to Home</a>

</div>

</body>
<style>
body {
    background: url('/static/images/bg.png') no-repeat center center fixed;
    background-size: cover;
    position: relative;
}

/* 🔥 Dark overlay for readability */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: -1;
}

/* Keep content above overlay */
.container, .navbar {
    position: relative;
    z-index: 1;
}

/* Improve card visibility */
.card {
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(5px);
}
</style>
</html>
