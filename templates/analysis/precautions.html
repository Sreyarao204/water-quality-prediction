<!DOCTYPE html>
<html>
<head>
    <title>Precautions</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2 class="text-center">Water Safety Precautions</h2>

    <div class="alert mt-3 text-center 
        {{ 'alert-success' if result=='Safe' else 'alert-danger' }}">
        <strong>Result:</strong> {{ result }}
    </div>

    <ul class="list-group mt-4">
        {% for p in precautions %}
            <li class="list-group-item">{{ p }}</li>
        {% endfor %}
    </ul>

</div>

</body>
<div class="d-flex justify-content-center gap-3 mt-4">

    <!-- 🔙 BACK BUTTON -->
    <a href="/charts" class="btn btn-outline-dark px-4">
        ← Back
    </a>

    <!-- 🔜 NEXT BUTTON -->
    <a href="/feature-importance" class="btn btn-primary px-4">
    Next →
</a>
<style>
body {
    background: url('/static/images/bg.png') no-repeat center center fixed;
    background-size: cover;
    position: relative;
}

/* 🔥 Dark overlay for readability */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: -1;
}

/* Keep content above overlay */
.container, .navbar {
    position: relative;
    z-index: 1;
}

/* Improve card visibility */
.card {
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(5px);
}
</style>
</html>
