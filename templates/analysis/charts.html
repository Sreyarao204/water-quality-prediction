<!DOCTYPE html>
<html>
<head>
    <title>Advanced Analysis</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .card {
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
        }

        canvas {
            height: 300px !important;
        }

        .result-box {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 18px;
        }

        .safe {
            background: #d4edda;
            color: #155724;
        }

        .unsafe {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">Advanced Water Quality Analysis</h2>

    <!-- RESULT HIGHLIGHT -->
    <div class="mb-4">
        <div class="result-box {{ 'safe' if result=='Safe' else 'unsafe' }}">
            Prediction: {{ result }}
        </div>
    </div>

    <!-- CHART ROW 1 -->
    <div class="row g-4">

        <!-- Bar Chart -->
        <div class="col-md-6">
            <div class="card">
                <h5 class="text-center">All Parameters</h5>
                <canvas id="barChart"></canvas>
            </div>
        </div>

        <!-- Pie Chart -->
        <div class="col-md-6">
            <div class="card">
                <h5 class="text-center">Water Safety</h5>
                <canvas id="pieChart"></canvas>
            </div>
        </div>

    </div>

    <!-- CHART ROW 2 -->
    <div class="row g-4 mt-2">

        <!-- Line Chart -->
        <div class="col-md-6">
            <div class="card">
                <h5 class="text-center">Trend View</h5>
                <canvas id="lineChart"></canvas>
            </div>
        </div>

        <!-- Doughnut Chart -->
        <div class="col-md-6">
            <div class="card">
                <h5 class="text-center">Usage Distribution</h5>
                <canvas id="doughnutChart"></canvas>
            </div>
        </div>

    </div>

    <!-- DOWNLOAD BUTTON -->
    <div class="text-center mt-4">
        <button onclick="downloadChart()" class="btn btn-primary">
            Download Chart Image
        </button>
    </div>

</div>

<script>

const labels = [
    "pH","Hardness","Solids","Chloramines",
    "Sulfate","Conductivity","Organic Carbon",
    "Trihalomethanes","Turbidity"
];

const values = [
    {{ ph }},
    {{ hardness }},
    {{ solids }},
    {{ chloramines }},
    {{ sulfate }},
    {{ conductivity }},
    {{ organic }},
    {{ trihalo }},
    {{ turbidity }}
];

// BAR
new Chart(document.getElementById("barChart"), {
    type: "bar",
    data: {
        labels: labels,
        datasets: [{ label: "Values", data: values }]
    }
});

// PIE
new Chart(document.getElementById("pieChart"), {
    type: "pie",
    data: {
        labels: ["Safe","Unsafe"],
        datasets: [{
            data: [{{ 100 if result=='Safe' else 0 }}, {{ 0 if result=='Safe' else 100 }}]
        }]
    }
});

// LINE
new Chart(document.getElementById("lineChart"), {
    type: "line",
    data: {
        labels: labels,
        datasets: [{ label: "Trend", data: values }]
    }
});

// DOUGHNUT (Dummy usage)
new Chart(document.getElementById("doughnutChart"), {
    type: "doughnut",
    data: {
        labels: ["Drinking","Agriculture","Industrial","Domestic"],
        datasets: [{
            data: [25,25,25,25]
        }]
    }
});

// DOWNLOAD FUNCTION
function downloadChart() {
    const link = document.createElement('a');
    link.download = 'chart.png';
    link.href = document.getElementById('barChart').toDataURL();
    link.click();
}

</script>

</body>
<div class="d-flex justify-content-center gap-3 mt-4">

    <a href="/analysis" class="btn btn-outline-dark px-4">
        ← Back
    </a>

    <a href="/precautions" class="btn btn-success px-4">
        Next →
    </a>

</div>
<style>
body {
    background: url('/static/images/bg.png') no-repeat center center fixed;
    background-size: cover;
    position: relative;
}

/* 🔥 Dark overlay for readability */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: -1;
}

/* Keep content above overlay */
.container, .navbar {
    position: relative;
    z-index: 1;
}

/* Improve card visibility */
.card {
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(5px);
}
</style>
</div>
</html>
