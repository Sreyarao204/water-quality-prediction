<!DOCTYPE html>
<html>
<head>
    <title>Feature Importance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">📊 Feature Importance</h2>

    <ul class="list-group">

        {% for name, value, impact in data %}
        <li class="list-group-item d-flex justify-content-between">

            <span><b>{{ name }}</b></span>

            <span>
                {{ value }}%
                <span class="badge 
                    {% if impact == 'High Impact' %}bg-danger
                    {% elif impact == 'Medium Impact' %}bg-warning
                    {% else %}bg-success{% endif %}">
                    {{ impact }}
                </span>
            </span>

        </li>
        {% endfor %}

    </ul>

    <div class="text-center mt-4">
        <a href="/reports" class="btn btn-secondary">← Back</a>
    </div>

</div>

</body>
</html>
